services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lifecoach
      POSTGRES_USER: lifecoach
      POSTGRES_PASSWORD: lifecoach
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifecoach -d lifecoach"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      DATABASE_URL: postgresql+asyncpg://lifecoach:lifecoach@db:5432/lifecoach
      BOT_PROXY: ${BOT_PROXY:-}
    restart: unless-stopped

volumes:
  pgdata:
